<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login UI</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0d0d0d;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Card */

.container {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(10px);

    padding: 35px;
    width: 360px;

    border-radius: 18px;
    border: 1px solid rgba(255, 255, 255, 0.1);

    color: white;
    box-shadow: 0 10px 30px rgba(0,0,0,0.6);

    transition: 0.3s ease;
}

/* hover effect */
.container:hover {
    transform: translateY(-5px);
    box-shadow: 0 15px 40px rgba(0,0,0,0.8);
}


/* Title */
.container h2 {
    margin-bottom: 5px;
}

.container p {
    font-size: 14px;
    color: #aaa;
}

/* Input */
input {
    width: 70%;  
    padding: 10px;
    border-radius: 10px;

    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.05);

    color: white;
    outline: none;

    display: block;
    margin: 10px auto; 
}
/* input {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: 2px solid #1e6fff;
    background: transparent;
    color: white;
    margin-bottom: 15px;
} */

/* Button */
.btn {
    width: 70%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: #1e6fff;
    color: white;
    font-size: 16px;
    cursor: pointer;
    /* text-align: center; */
}

/* Checkbox */
.checkbox {
    display: flex;
    align-items: center;
    margin-top: 10px;
    font-size: 14px;
}

.checkbox input {
    width: auto;
    margin-right: 10px;
}

/* Terms */
.terms {
    font-size: 12px;
    color: #aaa;
    margin-top: 10px;
}

.terms a {
    color: #ccc;
}
</style>
</head>

<body>

<center>
<div class="container">
    <h2 style="text-align: center;">Sign in</h2>
    <p>Login using username and password</p>

    <input type="text" id="username" placeholder="Enter Username">

    <input type="password" id="password" placeholder="Enter Password">

    <button class="btn" onclick="login()">Login</button>

  

    <div class="terms">
        By continuing, you agree to our <a href="#">Terms of service</a>
    </div>
</div>
</center>




</body>
</html>
