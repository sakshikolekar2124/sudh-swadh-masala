<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shipping Policy</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background-color: #e6d3bd; /* same background */
    }

    .shipping-container {
      max-width: 800px;
      margin: auto;
      text-align: center;
      padding: 80px 20px;
    }

    h1 {
      font-size: 40px;
      color: #4b0f1c;
      margin-bottom: 30px;
    }

    p {
      font-size: 20px;
      color: #6b2c3a;
      line-height: 1.8;
    }

    /* mobile responsive */
    @media (max-width: 600px) {
      h1 {
        font-size: 32px;
      }

      p {
        font-size: 16px;
      }
    }
  </style>
</head>

<body>

<div class="shipping-container">
  <h1>Shipping policy</h1>

  <p>
    All the products will be delivered within 5 to 7 working days based on location.
  </p>
</div>

</body>
</html>
