<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0d0d0d;
    color: white;
}

/* Header */
h2 {
    margin: 20px;
}

/* Card */
.card {
    background: #2b2b2b;
    margin: 20px;
    padding: 20px;
    border-radius: 12px;
}

/* label */
.label {
    font-size: 14px;
    color: #aaa;
}

/* value */
.value {
    margin-top: 5px;
    margin-bottom: 15px;
    font-size: 16px;
    color: white;
}

/* Address box */
.address-box {
    background: white;
    color: black;
    padding: 15px;
    border-radius: 8px;
    margin-top: 10px;
}

/* Buttons */
.btn {
    padding: 10px 15px;
    border: 1px solid #555;
    background: transparent;
    color: white;
    border-radius: 8px;
    cursor: pointer;
    margin-top: 15px;
}

.link {
    color: #1e6fff;
    margin-left: 10px;
    cursor: pointer;
}

/* footer */
.footer {
    margin: 20px;
    font-size: 12px;
    color: #aaa;
}

.footer a {
    color: #1e6fff;
    margin-right: 10px;
    text-decoration: none;
}
</style>
</head>

<body>

<h2>Profile</h2>

<!-- PROFILE CARD -->
<div class="card">

    <div class="label">Name</div>
    <div class="value" id="name">Loading...</div>

    <div class="label">Email</div>
    <div class="value" id="email">Loading...</div>

</div>

<!-- ADDRESS CARD -->
<div class="card">

    <div>
        <b>Addresses</b>
        <span class="link">+ Add</span>
    </div>

    <div class="address-box">
      
    </div>

</div>

<!-- BUTTONS -->
<button class="btn">Sign out</button>
<span class="link">Sign out of all devices</span>

<!-- FOOTER -->
<div class="footer">
    <a href="#">Refund policy</a>
    <a href="#">Shipping</a>
    <a href="#">Privacy policy</a>
    <a href="#">Terms of service</a>
</div>

<script>
// load data from login
let user = localStorage.getItem("username");
let email = localStorage.getItem("email");

document.getElementById("name").innerText = user ? user : "Guest";
document.getElementById("email").innerText = email ? email : "Not available";
</script>

</body>
</html>
